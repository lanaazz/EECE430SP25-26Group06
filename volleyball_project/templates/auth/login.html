<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Volleyball Platform</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/volleyball.css' %}">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card {
            background: var(--blue-sidebar);
            border-radius: var(--radius);
            padding: 40px 32px;
            width: 100%;
            max-width: 320px;
            box-shadow: var(--shadow);
            text-align: center;
        }
        .login-avatar {
            width: 64px; height: 64px; border-radius: 50%;
            background: var(--blue-light); margin: 0 auto 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; border: 3px solid var(--orange);
        }
        .login-field { margin-bottom: 12px; text-align: left; }
        .login-field label {
            display: block; font-size: 0.7rem; font-weight: 700;
            color: var(--gray-mid); margin-bottom: 4px; text-transform: uppercase;
        }
        .login-field input {
            width: 100%; padding: 9px 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--white); font-size: 0.82rem; outline: none;
        }
        .login-field input:focus { border-color: var(--orange); }
        .login-btn {
            width: 100%; padding: 10px;
            background: var(--orange); color: var(--blue-dark);
            border: none; border-radius: var(--radius-sm);
            font-size: 0.85rem; font-weight: 800;
            cursor: pointer; margin-top: 8px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .login-btn:hover { background: var(--orange-dark); }
        .login-error {
            background: rgba(232,64,64,0.15); border: 1px solid var(--red);
            border-radius: var(--radius-sm); padding: 8px; font-size: 0.75rem;
            color: #ff8080; margin-bottom: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-avatar">👤</div>
        <h1 style="font-size:1rem; font-weight:900; color:var(--white); margin-bottom:20px;">
            VOLLEYBALL<br><span style="color:var(--orange); font-size:0.75rem;">PLATFORM</span>
        </h1>

        {% if form.errors %}
        <div class="login-error">Invalid username or password.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="login-field">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" autofocus>
            </div>
            <div class="login-field">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password">
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>
</body>
</html>
