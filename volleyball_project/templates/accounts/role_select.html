<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Role — Volleyball Platform</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/volleyball.css' %}">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
        .role-card {
            background:var(--blue-sidebar);
            border-radius:var(--radius); padding:40px 32px;
            width:100%; max-width:300px; box-shadow:var(--shadow); text-align:center;
        }
        .role-icon { font-size:2.5rem; margin-bottom:12px; }
        .role-title { font-size:0.9rem; font-weight:900; color:var(--white); margin-bottom:6px; text-transform:uppercase; letter-spacing:1px; }
        .role-subtitle { font-size:0.72rem; color:var(--gray-text); margin-bottom:24px; }
        .role-btn {
            display:block; width:100%; padding:12px;
            background:rgba(255,255,255,0.08);
            border:1px solid var(--border);
            border-radius:var(--radius-sm);
            color:var(--white); font-size:0.82rem; font-weight:700;
            cursor:pointer; margin-bottom:8px; text-transform:uppercase;
            letter-spacing:0.5px; transition:all 0.15s;
        }
        .role-btn:hover { background:var(--orange); color:var(--blue-dark); border-color:var(--orange); }
    </style>
</head>
<body>
    <div class="role-card">
        <div class="role-icon">🏐</div>
        <div class="role-title">Select Your Role</div>
        <div class="role-subtitle">Choose how you participate in the team</div>
        <form method="post">
            {% csrf_token %}
            <button type="submit" name="role" value="player"  class="role-btn">Player</button>
            <button type="submit" name="role" value="captain" class="role-btn">Captain</button>
            <button type="submit" name="role" value="coach"   class="role-btn">Coach</button>
            <button type="submit" name="role" value="parent"  class="role-btn">Parent</button>
            <button type="submit" name="role" value="manager" class="role-btn">Manager</button>
        </form>
    </div>
</body>
</html>
